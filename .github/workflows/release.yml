name: Release

# ── Triggers ──────────────────────────────────────────────────────────────────
# • Every push to main  → auto-build with version 0.1.0-beta.{run_number}
# • Manual v* tag push  → build with that exact tag version
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  # ── Compute version ──────────────────────────────────────────────────────────
  version:
    name: Compute Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag:     ${{ steps.ver.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
          else
            BASE=$(node -p "require('./package.json').version" | sed -E 's/\.[0-9]+$//')
            VERSION="${BASE}.${GITHUB_RUN_NUMBER}"
            TAG="v${VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}  Tag: ${TAG}"

  # ── Tests (Linux, fast) ──────────────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run all tests
        run: pnpm test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: coverage/
          if-no-files-found: ignore

  # ── Build Windows portable zip ───────────────────────────────────────────────
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    needs: [version, test]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build & package
        run: node scripts/release.mjs
        env:
          NODE_ENV: production
          DEVBRIDGE_VERSION: ${{ needs.version.outputs.version }}

      - name: Verify release artifacts
        run: |
          $zip = Get-Item "release\*.zip" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (!$zip) {
            Write-Error "Release zip not found under release\!"
            exit 1
          }
          $size = $zip.Length / 1MB
          Write-Host "Release artifact: $($zip.Name)  ($([math]::Round($size,1)) MB)"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: devbridge-windows-${{ needs.version.outputs.tag }}
          path: release/*.zip
          if-no-files-found: error

  # ── Create GitHub Release ────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [version, build-windows]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            git tag "$TAG"
            git push origin "$TAG"
            echo "Created tag $TAG"
          else
            echo "Tag $TAG already exists — skipping"
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: devbridge-windows-${{ needs.version.outputs.tag }}
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Determine pre-release flag
        id: prerelease
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          if [[ "$VERSION" == *"beta"* ]] || [[ "$VERSION" == *"alpha"* ]] || [[ "$VERSION" == *"rc"* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name:       "DevBridge v${{ needs.version.outputs.version }}"
          tag_name:   ${{ needs.version.outputs.tag }}
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: artifacts/**/*.zip
          body: |
            ## DevBridge v${{ needs.version.outputs.version }}

            ### Installation

            **Option A — Installer (recommended)**
            Download `DevBridge-Setup-*.exe` and run it. The installer will:
            - Install DevBridge to `%PROGRAMFILES%\DevBridge\`
            - Create desktop & Start Menu shortcuts
            - Optionally register a Windows Service

            **Option B — Portable zip**
            Download `DevBridge-*-win-x64.zip`, extract anywhere, and run `start.bat`.
            The frontend UI will be served at http://localhost:4000

            ### Requirements
            - Windows 10 / 11 x64
            - No Node.js installation required (bundled)

            ### Changes
            See generated release notes below.
