name: Release

# Trigger on version tags (e.g. v0.1.0-beta.1, v1.2.3)
on:
  push:
    tags:
      - 'v*'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0-beta.1)'
        required: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # ── Tests (Linux, fast) ──────────────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run all tests
        run: pnpm test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: coverage/
          if-no-files-found: ignore

  # ── Build Windows EXE ────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & package
        run: node scripts/release.mjs
        env:
          NODE_ENV: production

      - name: Verify exe exists
        run: |
          if (!(Test-Path "release\devbridge.exe")) {
            Write-Error "EXE not found!"
            exit 1
          }
          $size = (Get-Item "release\devbridge.exe").Length / 1MB
          Write-Host "devbridge.exe size: $([math]::Round($size,1)) MB"

      # ── Build Inno Setup installer (optional — needs Inno Setup installed) ──
      - name: Install Inno Setup
        run: |
          choco install innosetup --no-progress -y
        continue-on-error: true

      - name: Build installer
        run: |
          if (Get-Command iscc -ErrorAction SilentlyContinue) {
            iscc installer\devbridge.iss
            Write-Host "Installer built."
          } else {
            Write-Host "Inno Setup not available — skipping installer step."
          }
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: devbridge-windows-${{ github.ref_name }}
          path: |
            release/*.zip
            installer/Output/*.exe
          if-no-files-found: warn

  # ── Create GitHub Release ────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-windows
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: devbridge-windows-${{ github.ref_name }}
          path: artifacts/

      - name: List artifacts
        run: ls -lh artifacts/ || true

      - name: Determine pre-release flag
        id: prerelease
        run: |
          if [[ "${{ github.ref_name }}" == *"beta"* ]] || [[ "${{ github.ref_name }}" == *"alpha"* ]] || [[ "${{ github.ref_name }}" == *"rc"* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: DevBridge ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            artifacts/release/*.zip
            artifacts/installer/Output/*.exe
          body: |
            ## DevBridge ${{ github.ref_name }}

            ### Installation

            **Option A — Installer (recommended)**
            Download `DevBridge-Setup-*.exe` and run it. The installer will:
            - Place `devbridge.exe` in `%PROGRAMFILES%\DevBridge\`
            - Create desktop & Start Menu shortcuts
            - Optionally register a Windows Service

            **Option B — Portable EXE**
            Download `devbridge.exe`, place it anywhere, and run it directly.
            The frontend UI will be served at http://localhost:4000

            ### Requirements
            - Windows 10 / 11 x64
            - No Node.js installation required (bundled)

            ### Changes
            See generated release notes below.
